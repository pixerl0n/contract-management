# Lokale Entwicklung (Laptop): baut das Image direkt aus dem Quellcode.

services:
  contracts:
    build: .
    container_name: contracts-app-dev-local
    image: local/contracts-app:dev
    ports:
      - "4210:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth:3000
      - COOKIE_DOMAIN=
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    volumes:
      - contracts-data:/app/data
      - ./server.js:/app/server.js
      - ./public:/app/public
    user: "1000:1000"
    networks:
      - default
      - auth-net

volumes:
  contracts-data:
    name: contracts-app-dev-local-data

networks:
  auth-net:
    name: auth-net
