# Test-Umgebung auf dem Server (Port 4201)

services:
  contracts:
    image: ghcr.io/${GHCR_USERNAME}/contracts-app:test
    container_name: contracts-app-test
    restart: unless-stopped
    ports:
      - "4201:3000"
    environment:
      - NODE_ENV=test
      - PORT=3000
      - API_KEY=${API_KEY:-}
      - AUTH_SERVICE_URL=http://auth:3000
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.example.com}
    volumes:
      - contracts-data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - default
      - auth-test-net

volumes:
  contracts-data:
    name: contracts-app-test-data

networks:
  auth-test-net:
    name: auth-test-net
