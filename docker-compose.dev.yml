# Dev-Umgebung auf dem Server (Port 4202)

services:
  contracts:
    image: ghcr.io/${GHCR_USERNAME}/contracts-app:dev
    container_name: contracts-app-dev
    restart: unless-stopped
    ports:
      - "4202:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - API_KEY=${API_KEY:-}
      - AUTH_SERVICE_URL=http://auth:3000
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.example.com}
      - COOKIE_NAME=session_dev
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    volumes:
      - contracts-data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - default
      - auth-dev-net

volumes:
  contracts-data:
    name: contracts-app-dev-data

networks:
  auth-dev-net:
    name: auth-dev-net
