# Produktionsumgebung auf dem Server (Port 4200)

services:
  contracts:
    image: ghcr.io/${GHCR_USERNAME}/contracts-app:prod
    container_name: contracts-app-prod
    restart: unless-stopped
    ports:
      - "4200:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth:3000
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.example.com}
      - COOKIE_NAME=session_prod
      - LOG_LEVEL=${LOG_LEVEL:-}
    volumes:
      - contracts-data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - default
      - auth-prod-net

volumes:
  contracts-data:
    name: contracts-app-prod-data

networks:
  auth-prod-net:
    name: auth-prod-net
